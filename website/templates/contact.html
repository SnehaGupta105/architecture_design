{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
    body { background:#f8f9fa; }

    .contact-section { padding:60px 0; }

    .contact-image {
        width:100%;
        height:100%;
        object-fit:cover;
        border-radius:15px;
    }

    .contact-card {
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    .btn-custom {
        background:#d4a017;
        color:white;
    }

    .btn-custom:hover {
        background:#b8860b;
    }

    .info-box {
        background:#111827;
        color:white;
        padding:20px;
        border-radius:10px;
        margin-top:20px;
    }

    .map-section{
    padding:80px 0;
    background:#f8f9fa;
}

.map-section h2{
    text-align:center;
    margin-bottom:30px;
    font-size:35px;
    font-weight:700;
}

.map-box{
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.map-box iframe{
    display:block;
    width:100%;
    height:450px;
}
</style>

<div class="container contact-section">

    <div class="text-center mb-5">
        <h1>Contact Gupta Building Designer</h1>
        <p class="text-muted">Let's Design Your Dream Home Together</p>
    </div>

    <div class="row g-4">

        <!-- Image -->
        <div class="col-lg-6">
            <img src="{% static 'images/house3.jpg' %}" class="contact-image">
        </div>

        <!-- Form -->
        <div class="col-lg-6">

            <div class="contact-card">

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Full Name</label>
                        <input type="text" name="name" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>

                    <div class="mb-3">
    <label>Subject</label>
    <input type="text" name="subject" class="form-control" placeholder="Enter Subject">
</div>

                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" name="phone" class="form-control">
                    </div>

                    <div class="mb-3">
    <label>Selected Plan</label>
    <input type="text" name="plan" class="form-control"
           value="{{ selected_plan }}" readonly>
</div>

                    <div class="mb-3">
                        <label>Plot Size</label>
                        <input type="text" name="plot_size" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Message</label>
                        <textarea name="message" rows="4" class="form-control"></textarea>
                    </div>

                    <button type="submit" class="btn btn-custom w-100">
                        Send Message
                    </button>

                </form>

                <div class="info-box">
                    <h5>Contact Information</h5>
                    <p>📍 Civil Line Banda, UP</p>
                    <p>📞 +91 XXXXX XXXXX</p>
                    <p>📧 info@guptabuildingdesigner.com</p>
                </div>

            </div>

        </div>

    </div>

</div>
<section class="map-section">
    <div class="container">
        <h2>Our Office Location</h2>

        <div class="map-box">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3601.8004378418973!2d80.33344297395949!3d25.47833832025873!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x399ccf2f765f369d%3A0x700245d732db6716!2sGUPTA%20BUILDING%20DESIGNER!5e0!3m2!1sen!2sin!4v1782573371841!5m2!1sen!2sin" 
            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
        </div>
    </div>
</section>


{% endblock %}
